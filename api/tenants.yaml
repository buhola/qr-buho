openapi: 3.0.0
info:
  title: "QRAPI - Tenants"
  version: 1.0.0
servers:
  - url: https://qr.buho.la
    description: Main Server
  - url: https://{tenant_id}.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant Subdomain
paths:
  "/api/tenant/list":
    get:
      summary: "List by Filter"
      parameters:
        - name: id
          in: query
          schema:
            type: string
          description: Tenant ID
        - name: domain
          in: query
          schema:
            type: string
          description: Tenant domain
        - name: active
          in: query
          schema:
            type: boolean
          description: Filter by active status
        - name: paginate
          in: query
          schema:
            type: integer
          description: Number of items per page
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "31845898-ba4b-4b59-b932-a6d34730cc55"
                        name:
                          type: string
                          example: "EmpresaDemo"
                        domain:
                          type: string
                          example: "demooooo"
                        email:
                          type: string
                          example: "admin@empresa.com"
                        active:
                          type: boolean
                          example: true
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 1
  "/api/tenant/register":
    post:
      summary: "Register Tenant"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - domain
                - email
                - password
                - plan_id
              properties:
                name:
                  type: string
                  description: "Nombre del tenant"
                  example: "EmpresaDemo"
                domain:
                  type: string
                  description: "Dominio para el tenant"
                  example: "demooooo"
                email:
                  type: string
                  format: email
                  description: "Correo electrónico"
                  example: "admin@empresa.com"
                password:
                  type: string
                  format: password
                  description: "Contraseña"
                  example: "123456"
                plan_id:
                  type: integer
                  description: "ID del plan a asignar"
                  example: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Tenant registrado exitosamente"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "31845898-ba4b-4b59-b932-a6d34730cc55"
                      name:
                        type: string
                        example: "EmpresaDemo"
                      domain:
                        type: string
                        example: "demooooo"
                      email:
                        type: string
                        example: "admin@empresa.com"
  "/api/tenant/delete/{id}":
    delete:
      summary: "Delete Tenant"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Tenant ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Tenant eliminado exitosamente"