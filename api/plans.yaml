openapi: 3.0.0
info:
  title: "QRAPI - Plans"
  version: 1.0.0
servers:
  - url: https://qr.buho.la
    description: Main Server
  - url: https://{tenant_id}.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant Subdomain
paths:
  "/api/plan/list":
    get:
      summary: "List by filter"
      parameters:
        - name: id
          in: query
          schema:
            type: integer
          description: Plan ID
        - name: name
          in: query
          schema:
            type: string
          description: Filter by plan name
        - name: description
          in: query
          schema:
            type: string
          description: Filter by description
        - name: paginate
          in: query
          schema:
            type: integer
          description: Number of items per page
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: "Plan Premium"
                        is_free:
                          type: boolean
                          example: true
                        price:
                          type: number
                          example: 49.99
                        description:
                          type: string
                          example: "Plan con todas las funcionalidades"
                        limit_devices:
                          type: integer
                          example: 10
                        limit_messages:
                          type: integer
                          example: 5000
                        limit_contacts:
                          type: integer
                          example: 1000
  "/api/plan/register":
    post:
      summary: "Registrar Plan"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - is_free
                - price
                - limit_devices
                - limit_messages
                - limit_contacts
              properties:
                name:
                  type: string
                  description: "Nombre del plan"
                  example: "Plan Premium"
                is_free:
                  type: boolean
                  description: "Indica si el plan es gratuito"
                  example: true
                price:
                  type: number
                  description: "Precio del plan"
                  example: 49.99
                description:
                  type: string
                  description: "Descripción detallada del plan"
                  example: "Plan con todas las funcionalidades"
                limit_devices:
                  type: integer
                  description: "Límite de dispositivos"
                  example: 10
                limit_messages:
                  type: integer
                  description: "Límite de mensajes"
                  example: 5000
                limit_contacts:
                  type: integer
                  description: "Límite de contactos"
                  example: 1000
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Plan registrado exitosamente"
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: "Plan Premium"
                      is_free:
                        type: boolean
                        example: true
                      price:
                        type: number
                        example: 49.99
                      description:
                        type: string
                        example: "Plan con todas las funcionalidades"
                      limit_devices:
                        type: integer
                        example: 10
                      limit_messages:
                        type: integer
                        example: 5000
                      limit_contacts:
                        type: integer
                        example: 1000