openapi: 3.0.0
info:
  title: "Campañas"
  version: 1.0.0
servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant Subdomain
paths:
  "/api/campaigns/manual":
    post:
      summary: "Crear Campaña Manual"
      description: "Crear una nueva campaña ingresando los números manualmente."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - message
              properties:
                title:
                  type: string
                  description: "Título de la campaña"
                  example: "Campaña de prueba"
                groups:
                  type: array
                  items:
                    type: integer
                  description: "IDs de los grupos a enviar"
                  example: [1, 2]
                message:
                  type: string
                  description: "Contenido del mensaje"
                  example: "Hola, este es un mensaje de prueba."
                schedule_at:
                  type: string
                  format: date-time
                  description: "Fecha y hora de programación"
                  example: "2025-10-01 10:00:00"
                attach_pdf:
                  type: string
                  nullable: true
                  description: "Archivo PDF adjunto (URL o base64)"
                  example: null
      responses:
        '200':
          description: Éxito
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Campaña creada exitosamente"
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      title:
                        type: string
                        example: "Campaña de prueba"
                      groups:
                        type: array
                        items:
                          type: integer
                        example: [1, 2]
                      message:
                        type: string
                        example: "Hola, este es un mensaje de prueba."
                      schedule_at:
                        type: string
                        format: date-time
                        example: "2025-10-01 10:00:00"
                      status:
                        type: string
                        example: "scheduled"
  "/api/campaigns/list":
    get:
      summary: "Listar Campañas"
      description: "Listar campañas (también sirve para campañas desde Excel)."
      parameters:
        - name: paginate
          in: query
          schema:
            type: integer
            default: 10
          description: Ítems por página
      responses:
        '200':
          description: Éxito
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        title:
                          type: string
                          example: "Campaña de prueba"
                        groups:
                          type: array
                          items:
                            type: integer
                          example: [1, 2]
                        message:
                          type: string
                          example: "Hola, este es un mensaje de prueba."
                        schedule_at:
                          type: string
                          format: date-time
                          example: "2025-10-01 10:00:00"
                        status:
                          type: string
                          example: "scheduled"
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 1
  "/api/campaigns/show/{id}":
    get:
      summary: "Detalles de Campaña"
      description: "Obtener información detallada de una campaña específica."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la Campaña
      responses:
        '200':
          description: Éxito
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      title:
                        type: string
                        example: "Campaña de prueba"
                      groups:
                        type: array
                        items:
                          type: integer
                        example: [1, 2]
                      message:
                        type: string
                        example: "Hola, este es un mensaje de prueba."
                      schedule_at:
                        type: string
                        format: date-time
                        example: "2025-10-01 10:00:00"
                      status:
                        type: string
                        example: "scheduled"
                      total_recipients:
                        type: integer
                        example: 50
                      sent:
                        type: integer
                        example: 45
                      failed:
                        type: integer
                        example: 5
