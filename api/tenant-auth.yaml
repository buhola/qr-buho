openapi: 3.0.0
info:
  title: "Autenticación"
  version: 1.0.0
servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant Subdomain
paths:
  "/api/login":
    post:
      summary: "Login de Tenant"
      description: "Autentica un usuario tenant y retorna un token JWT"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: "Correo electrónico del usuario"
                  example: "correo@example.com"
                password:
                  type: string
                  format: password
                  description: "Contraseña"
                  example: "passaword"
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: "Token JWT"
                  token_type:
                    type: string
                    example: "Bearer"
                  expires_in:
                    type: integer
                    description: "Tiempo de expiración en segundos"
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                        format: email
        '401':
          description: No autorizado - Token inválido o ausente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
  "/api/verify_token":
    post:
      summary: "Verificar token de Tenant"
      description: "Verifica si el token de autenticación del tenant es válido."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_token:
                  type: string
                  description: "Token JWT a verificar"
      responses:
        '200':
          description: Éxito
