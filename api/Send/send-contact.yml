openapi: 3.0.0
info:
  title: "Enviar contacto"
  description: "Envía un contacto de WhatsApp a través del sistema."
  version: 1.0.0

servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant Subdomain

paths:
  "/api/send/{instance}":
    post:
      summary: "Enviar contacto"
      description: "Envía un contacto de WhatsApp."
      parameters:
        - name: instance
          in: path
          required: true
          description: Número de dispositivo
          schema:
            type: string
            example: "51987654321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - payload
              properties:
                type:
                  type: string
                  example: "sendContact"
                payload:
                  type: object
                  required:
                    - number
                    - contact
                  properties:
                    number:
                      type: string
                      example: "51987654321"
                    contact:
                      type: object
                      description: Contacto de WhatsApp
                      properties:
                        fullName:
                          type: string
                          example: "Juan Pérez"
                        phoneNumber:
                          type: string
                          example: "51999888777"
                        organization:
                          type: string
                          example: "Digital Buho"
            example:
              type: sendContact
              payload:
                number: "51987654321"
                contact:
                  fullName: "Juan Pérez"
                  phoneNumber: "51999888777"
                  organization: "Digital Buho"
      responses:
        '200':
          description: "Contacto enviado exitosamente"
          content:
            application/json:
              schema:
                type: object
                example:
                  key:
                    remoteJid: "51987654321@s.whatsapp.net"
                    fromMe: true
                    id: "3EB0123456789ABCDEF"
                  status: "PENDING"