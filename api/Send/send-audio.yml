openapi: 3.0.3
info:
  title: Send WhatsApp Audio
  version: 1.0.0

servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant subdomain

paths:
  /api/send/{instance}:
    post:
      summary: Send WhatsApp audio
      description: Send an audio message using the sendWhatsAppAudio type.
      parameters:
        - name: instance
          in: path
          required: true
          description: Connected device instance number
          schema:
            type: string
            example: "51987654321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, payload]
              properties:
                type:
                  type: string
                  example: sendWhatsAppAudio
                payload:
                  type: object
                  required: [number, audio]
                  properties:
                    number:
                      type: string
                      example: "51987654321"
                    audio:
                      type: string
                      description: Public URL or base64 audio content
                      example: "https://example.com/audio.mp3"
            example:
              type: sendWhatsAppAudio
              payload:
                number: "51987654321"
                audio: "https://example.com/audio.mp3"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                example:
                  key:
                    remoteJid: "51987654321@s.whatsapp.net"
                    fromMe: true
                    id: "3EB0123456789ABCDEF"
                  status: "PENDING"