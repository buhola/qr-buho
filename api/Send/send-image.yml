openapi: 3.0.0
info:
  title: "Enviar imagen"
  description: "Envía una imagen a través del sistema."
  version: 1.0.0

servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant Subdomain

paths:
  "/api/send/{instance}":
    post:
      summary: "Enviar imagen"
      description: "Envía una imagen o foto a través de la API de Evolution."
      parameters:
        - name: instance
          in: path
          required: true
          description: Número de dispositivo
          schema:
            type: string
            example: "51987654321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - payload
              properties:
                type:
                  type: string
                  example: "sendMedia"
                payload:
                  type: object
                  required:
                    - number
                    - mediatype
                    - media
                  properties:
                    number:
                      type: string
                      example: "51987654321"
                    mediatype:
                      type: string
                      example: "image"
                    media:
                      type: string
                      example: "https://example.com/foto.jpg"
                    caption:
                      type: string
                      example: "Esta es mi foto favorita"
                    mimetype:
                      type: string
                      example: "image/jpeg"
                    filename:
                      type: string
                      example: "foto.jpg"
                    delay:
                      type: integer
                      example: 1200
            example:
              type: sendMedia
              payload:
                number: "51987654321"
                mediatype: "image"
                media: "https://example.com/foto.jpg"
                caption: "Esta es mi foto favorita"
                mimetype: "image/jpeg"
                filename: "foto.jpg"
                delay: 1200
      responses:
        '200':
          description: "Mensaje de imagen enviado exitosamente"
          content:
            application/json:
              schema:
                type: object
                example:
                  key:
                    remoteJid: "51987654321@s.whatsapp.net"
                    fromMe: true
                    id: "3EB0123456789ABCDEF"
                  status: "PENDING"