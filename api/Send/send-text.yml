openapi: 3.0.3
info:
  title: Send Text
  version: 1.0.0

servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant subdomain

paths:
  /api/send/{instance}:
    post:
      summary: Send text message
      description: Send a plain text WhatsApp message through Evolution Gateway.
      parameters:
        - name: instance
          in: path
          required: true
          description: Connected device instance number
          schema:
            type: string
            example: "51987654321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, payload]
              properties:
                type:
                  type: string
                  example: sendText
                payload:
                  type: object
                  required: [number, text]
                  properties:
                    number:
                      type: string
                      example: "51987654321"
                    text:
                      type: string
                      example: "Hola, este es un mensaje de prueba"
                    delay:
                      type: integer
                      default: 1200
                      example: 1200
            example:
              type: sendText
              payload:
                number: "51987654321"
                text: "Hola, este es un mensaje de prueba"
                delay: 1200
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                example:
                  key:
                    remoteJid: "51987654321@s.whatsapp.net"
                    fromMe: true
                    id: "3EB0123456789ABCDEF"
                  status: "PENDING"