openapi: 3.0.0
info:
  title: "Enviar mensaje de texto"
  description: "Envía un mensaje de texto simple con opciones de delay (simular escritura) y mention."
  version: 1.0.0

servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant subdomain

paths:
  "/api/send/{instance}":
    post:
      summary: "Enviar mensaje de texto"
      description: "Envía un mensaje de texto simple con opciones de delay (simular escritura) y mention."
      parameters:
        - name: instance
          in: path
          required: true
          description: "Número de dispositivo"
          schema:
            type: string
            example: "51987654321"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - payload
              properties:
                type:
                  type: string
                  example: "sendText"
                payload:
                  type: object
                  required:
                    - number
                    - text
                  properties:
                    number:
                      type: string
                      example: "51987654321"
                      description: "Número de destino (sin @s.whatsapp.net)"
                    text:
                      type: string
                      example: "¡Hola! ¿Cómo estás hoy?"
                    delay:
                      type: integer
                      example: 1500
                      description: "Retraso en ms para simular escritura"
                    mention:
                      type: array
                      items:
                        type: string
                      description: "Números a mencionar (@)"
            example:
              type: sendText
              payload:
                number: "51987654321"
                text: "¡Hola! ¿Cómo estás hoy?"
                delay: 1500
                mention:
                  - "@51987654321"

      responses:
        '200':
          description: "Mensaje enviado exitosamente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  sendResult:
                    type: object
                    description: "Detalles del mensaje enviado (key, messageTimestamp, etc.)"
                    properties:
                      key:
                        type: object
                        properties:
                          remoteJid:
                            type: string
                            example: "51987654321@s.whatsapp.net"
                          fromMe:
                            type: boolean
                            example: true
                          id:
                            type: string
                            example: "3EB0123456789ABCDEF"
                      messageTimestamp:
                        type: integer
                        example: 1627889400000