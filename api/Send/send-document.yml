openapi: 3.0.0
info:
  title: "Enviar documento"
  description: "Envía documentos o archivos adjuntos."
  version: 1.0.0

servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant Subdomain

paths:
  "/api/send/{instance}":
    post:
      summary: "Enviar documento"
      description: "Envía un documento o archivo adjunto usando Evolution."
      parameters:
        - name: instance
          in: path
          required: true
          description: Número de dispositivo
          schema:
            type: string
            example: "51987654321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - payload
              properties:
                type:
                  type: string
                  example: "sendMedia"
                payload:
                  type: object
                  required:
                    - number
                    - mediatype
                    - media
                    - filename
                  properties:
                    number:
                      type: string
                      example: "51987654321"
                    mediatype:
                      type: string
                      example: "document"
                    media:
                      type: string
                      example: "https://example.com/contrato.pdf"
                    caption:
                      type: string
                      example: "Adjunto el contrato"
                    mimetype:
                      type: string
                      example: "application/pdf"
                    filename:
                      type: string
                      example: "contrato.pdf"
                    delay:
                      type: integer
                      example: 1200
            example:
              type: sendMedia
              payload:
                number: "51987654321"
                mediatype: "document"
                media: "https://example.com/contrato.pdf"
                caption: "Adjunto el contrato"
                mimetype: "application/pdf"
                filename: "contrato.pdf"
                delay: 1200
      responses:
        '200':
          description: "Mensaje de documento enviado exitosamente"
          content:
            application/json:
              schema:
                type: object
                example:
                  key:
                    remoteJid: "51987654321@s.whatsapp.net"
                    fromMe: true
                    id: "3EB0123456789ABCDEF"
                  status: "PENDING"