openapi: 3.0.3
info:
  title: Send List
  version: 1.0.0

servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant subdomain

paths:
  /api/send/{instance}:
    post:
      summary: Send list message
      description: Send an interactive list message.
      parameters:
        - name: instance
          in: path
          required: true
          description: Connected device instance number
          schema:
            type: string
            example: "51987654321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, payload]
              properties:
                type:
                  type: string
                  example: sendList
                payload:
                  type: object
                  required: [number, title, buttonText, sections]
                  properties:
                    number:
                      type: string
                      example: "51987654321"
                    title:
                      type: string
                      example: "Menú principal"
                    buttonText:
                      type: string
                      example: "Ver opciones"
                    description:
                      type: string
                      example: "Selecciona una opción"
                    footerText:
                      type: string
                      example: "Digital Buho"
                    sections:
                      type: array
                      items:
                        type: object
                        properties:
                          title:
                            type: string
                            example: "Sección 1"
                          rows:
                            type: array
                            items:
                              type: object
                              properties:
                                title:
                                  type: string
                                  example: "Opción 1"
                                description:
                                  type: string
                                  example: "Descripción de la opción"
                                rowId:
                                  type: string
                                  example: "option_1"
            example:
              type: sendList
              payload:
                number: "51987654321"
                title: "Menú principal"
                buttonText: "Ver opciones"
                description: "Selecciona una opción"
                footerText: "Digital Buho"
                sections:
                  - title: "Sección 1"
                    rows:
                      - title: "Opción 1"
                        description: "Descripción de la opción"
                        rowId: "option_1"
                      - title: "Opción 2"
                        description: "Otra descripción"
                        rowId: "option_2"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                example:
                  key:
                    remoteJid: "51987654321@s.whatsapp.net"
                    fromMe: true
                    id: "3EB0123456789ABCDEF"
                  status: "PENDING"