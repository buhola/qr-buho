openapi: 3.0.0
info:
  title: "Enviar encuesta"
  description: "Envía una encuesta con opciones seleccionables."
  version: 1.0.0

servers:
  - url: https://{tenant_id}.qr.buho.la
    description: Tenant Server
    variables:
      tenant_id:
        default: demo
        description: Tenant Subdomain

paths:
  "/api/send/{instance}":
    post:
      summary: "Enviar encuesta"
      description: "Envía una encuesta con opciones seleccionables."
      parameters:
        - name: instance
          in: path
          required: true
          description: Número de dispositivo
          schema:
            type: string
            example: "51987654321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - payload
              properties:
                type:
                  type: string
                  example: "sendPoll"
                payload:
                  type: object
                  required:
                    - number
                    - name
                    - selectableCount
                    - values
                  properties:
                    number:
                      type: string
                      example: "51987654321"
                    name:
                      type: string
                      example: "¿Qué opción prefieres?"
                    selectableCount:
                      type: integer
                      example: 1
                    values:
                      type: array
                      items:
                        type: string
                      example:
                        - "Opción 1"
                        - "Opción 2"
                        - "Opción 3"
            example:
              type: sendPoll
              payload:
                number: "51987654321"
                name: "¿Qué opción prefieres?"
                selectableCount: 1
                values:
                  - "Opción 1"
                  - "Opción 2"
                  - "Opción 3"
      responses:
        '200':
          description: "Encuesta enviada exitosamente"
          content:
            application/json:
              schema:
                type: object
                example:
                  key:
                    remoteJid: "51987654321@s.whatsapp.net"
                    fromMe: true
                    id: "3EB0123456789ABCDEF"
                  status: "PENDING"